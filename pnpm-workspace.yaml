# settings for Nuxt & pnpm

# migrated from .npmrc
# https://pnpm.io/settings#shamefullyhoist
shamefullyHoist: true

# migrated from package.json
# https://pnpm.io/settings#onlybuiltdependencies
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  unrs-resolver: true

# use Vite 8
overrides:
  'vite': '^8.0.16'

minimumReleaseAgeExclude:
  # build @ 2026-06-02 20:05 GMT+2
  - '@nuxt/kit@4.4.7'
  - '@nuxt/nitro-server@4.4.7'
  - '@nuxt/schema@4.4.7'
  - '@nuxt/vite-builder@4.4.7'
  - 'nuxt@4.4.7'
  - 'elrh-cosca@0.3.6'
